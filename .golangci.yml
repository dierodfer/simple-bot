version: "2"
linters:
  enable:
    - gocritic
    - revive
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
        - name: var-naming
        - name: blank-imports
        - name: error-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
  exclusions:
    generated: lax
    rules:
      - path: internal/utils/market\.go
        linters:
          - revive
        text: "avoid meaningless package names"
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
